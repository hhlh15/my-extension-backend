<!DOCTYPE html>
<html>
<head>
    <title>ConceptLocker</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.8s ease; 
            font-family: 'Playfair Display', serif;
            text-align: center;
            text-transform: lowercase; 
        }

        .card {
            padding: 40px;
            max-width: 80%;
        }

        #topic {
            font-size: 1.5rem;
            font-style: italic; 
            color: rgba(0,0,0,0.4); 
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        #hook {
            font-size: 4.5rem; 
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 50px;
            line-height: 1.1;
        }

        button {
            padding: 15px 40px;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            text-transform: lowercase;
            background: transparent;
            color: #1a1a1a;
            border: 1px solid #1a1a1a; 
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #1a1a1a;
            color: white;
            transform: translateY(-2px); 
        }

        /* The Smart Icon in the top right */
        .mode-icon {
            position: absolute;
            top: 30px;
            right: 40px;
            font-size: 2.5rem;
            color: #1a1a1a;
            text-decoration: none;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }
        
        .mode-icon:hover {
            opacity: 1;
        }

        /* A subtle text reminder that you are in Important Mode */
        .important-badge {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 1.2rem;
            color: #d35400; /* Deep orange */
            font-style: italic;
            font-weight: bold;
        }
    </style>
</head>
<body id="bg">

    {% if mode == "main" %}
        <a href="/important" class="mode-icon" title="Go to Important Topics">🎯</a>
    {% else %}
        <div class="important-badge"></div>
        <a href="/" class="mode-icon" title="Go to Master Syllabus">⌂</a>
    {% endif %}

    <div class="card">
        <div id="topic">{{ data.topic }}</div>
        <div id="hook">{{ data.hook }}</div>
        
        <button onclick="changeEverything()">next concept</button>
    </div>

    <script>
        const colors = ['#f3e5f5', '#e8f5e9', '#fff3e0', '#e3f2fd', '#fce4ec', '#f1f8e9', '#efebe9'];
        
        function changeEverything() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('bg').style.backgroundColor = randomColor;
            
            // Reloads the exact mode you are currently using
            location.reload();
        }

        window.onload = function() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('bg').style.backgroundColor = randomColor;
        };
    </script>
</body>
</html>
